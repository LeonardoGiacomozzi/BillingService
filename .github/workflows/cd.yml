name: BillingService CD
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4.0.1
        with:
          dotnet-version: '10.x'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/fiap-oficina-billing-service:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/fiap-oficina-billing-service:$IMAGE_TAG
          docker tag $ECR_REGISTRY/fiap-oficina-billing-service:$IMAGE_TAG $ECR_REGISTRY/fiap-oficina-billing-service:latest
          docker push $ECR_REGISTRY/fiap-oficina-billing-service:latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name fiap-oficina-cluster --region us-east-1

      - name: Deploy to EKS
        env:
          MERCADOPAGO_TOKEN: ${{ secrets.MERCADOPAGO_TOKEN }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
        run: |
          sed -i "s|\${MERCADOPAGO_TOKEN}|$MERCADOPAGO_TOKEN|g" k8s/deployment.yaml
          sed -i "s|\${SQS_URL}||g" k8s/deployment.yaml
          sed -i "s|\${JWT_KEY}|$JWT_KEY|g" k8s/deployment.yaml
          sed -i "s|\${JWT_ISSUER}|$JWT_ISSUER|g" k8s/deployment.yaml
          sed -i "s|\${JWT_AUDIENCE}|$JWT_AUDIENCE|g" k8s/deployment.yaml
          sed -i "s|image: fiap-oficina-billing-service:latest|image: ${{ steps.login-ecr.outputs.registry }}/fiap-oficina-billing-service:latest|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment billing-service

      - name: Show Service URL
        run: |
          echo "=========================================================="
          echo "BillingService successfully deployed!"
          echo "Fetching LoadBalancer URL..."
          # Wait up to 30 seconds for the LoadBalancer to get its DNS
          for i in {1..10}; do
            LB_URL=$(kubectl get svc billing-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "")
            if [ ! -z "$LB_URL" ]; then
              break
            fi
            sleep 3
          done
          if [ -z "$LB_URL" ]; then
            LB_URL=$(kubectl get svc billing-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || echo "Pending...")
          fi
          echo "Public URL: http://$LB_URL"
          echo "=========================================================="
