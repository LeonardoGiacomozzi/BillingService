name: Billing Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      
      - name: Restore
        run: dotnet restore FiapOficina.BillingService/src/FiapOficina.BillingService.Api/FiapOficina.BillingService.Api.csproj

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Sonar Begin
        run: |
          dotnet-sonarscanner begin /k:"LeonardoGiacomozzi_BillingService" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Build
        run: dotnet build FiapOficina.BillingService/src/FiapOficina.BillingService.Api/FiapOficina.BillingService.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test FiapOficina.BillingService/tests/FiapOficina.BillingService.Tests/FiapOficina.BillingService.Tests.csproj --configuration Release --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./TestResults

      - name: Sonar End
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: fiap-oficina-billing-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME }} --region us-east-1

      - name: Get SQS URL
        id: sqs
        run: |
          SQS_URL=$(aws sqs get-queue-url --queue-name "budget-created-queue" --query "QueueUrl" --output text)
          if [ -z "$SQS_URL" ] || [ "$SQS_URL" == "None" ]; then
            echo "ERROR: SQS Queue 'budget-created-queue' not found!"
            exit 1
          fi
          echo "sqs_url=$SQS_URL" >> $GITHUB_OUTPUT

      - name: Deploy to EKS
        env:
          MERCADOPAGO_TOKEN: ${{ secrets.MERCADOPAGO_TOKEN }}
          SQS_URL: ${{ steps.sqs.outputs.sqs_url }}
        run: |
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/billing-service billing-service=${{ steps.login-ecr.outputs.registry }}/fiap-oficina-billing-service:${{ github.sha }}
